
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrapbook Vintage Interaktif</title>
  
  <!-- Tailwind CSS CDN untuk Desain & Layout -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React, ReactDOM, dan Babel Standalone (Versi Paling Stabil dari cdnjs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>

  <!-- Google Fonts Vintage -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

  <style>
    /* Menggunakan Font yang Sudah Dimuat */
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
    .font-mono {
      font-family: 'Courier Prime', monospace;
    }

    /* Animasi Lembut Saat Pindah Halaman */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out forwards;
    }

    /* Putaran Vinyl piringan hitam */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin 8s linear infinite;
    }

    /* Desain Scrollbar Klasik di dalam surat */
    .scrollbar-thin::-webkit-scrollbar {
      width: 5px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.03);
      border-radius: 4px;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: rgba(139, 94, 60, 0.25);
      border-radius: 4px;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 94, 60, 0.45);
    }
  </style>
</head>
<body class="bg-[#f4efe6]">

  <!-- Tempat React me-render seluruh website kita -->
  <div id="root"></div>

  <!-- Kodingan React Utama (Babel compiler otomatis berjalan di browser) -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Tema Warna Jurnal Vintage
    const PALETTES = {
      parchment: {
        bg: 'bg-[#f4efe6]',
        border: 'border-[#dfd3be]',
        text: 'text-[#5c4d43]',
        accent: '#a98467',
        tape: 'bg-[#dfceb4]/60',
        card: 'bg-[#fcfaf2]',
        wax: 'bg-[#9d3a3a]',
        name: 'Klasik Krem'
      },
      dustyRose: {
        bg: 'bg-[#f5ebe6]',
        border: 'border-[#e6cecb]',
        text: 'text-[#614545]',
        accent: '#c99a9a',
        tape: 'bg-[#e2bab5]/60',
        card: 'bg-[#fffbf9]',
        wax: 'bg-[#804242]',
        name: 'Dusty Rose'
      },
      paleSage: {
        bg: 'bg-[#eff2eb]',
        border: 'border-[#d3dbcc]',
        text: 'text-[#424d3b]',
        accent: '#8e9e82',
        tape: 'bg-[#cdd8c4]/60',
        card: 'bg-[#f9fbf7]',
        wax: 'bg-[#405638]',
        name: 'Sage Kuno'
      },
      darkSepia: {
        bg: 'bg-[#eae3d2]',
        border: 'border-[#cfc4a6]',
        text: 'text-[#3e342d]',
        accent: '#826f5d',
        tape: 'bg-[#ccbe9b]/60',
        card: 'bg-[#f3edd9]',
        wax: 'bg-[#7a3e26]',
        name: 'Sepia Tua'
      }
    };

    // Data cadangan jika link/localstorage bermasalah atau kosong
    const DEFAULT_MESSAGES = {
      recipient: 'Sahabat Terbaikku',
      sender: 'Dari Sahabatmu',
      coverTitle: 'Buku Semangat & Pelukan Hangat',
      coverSubtitle: 'Sebuah jurnal kecil peneman hari-harimu yang penuh perjuangan.',
      letterIntro: 'Hei kamu, baca ini saat dunia terasa sedikit terlalu bising ya...',
      letterBody: 'Aku tahu akhir-akhir ini mungkin tidak mudah bagimu. Ada banyak hal yang kamu pikirkan dan perjuangkan sendirian. Tapi lewat scrapbook digital kecil ini, aku ingin mengingatkanmu bahwa kamu adalah orang yang luar biasa kuat, berharga, dan kehadiranmu di dunia ini adalah sebuah anugerah yang sangat indah. Jangan pernah menyerah, ya? Aku selalu ada di sini untukmu.',
      polaroidText1: 'Kamu luar biasa, tahu!',
      polaroidText2: 'Istirahat sejenak, yuk?',
      polaroidText3: 'Badai pasti berlalu 🌸',
      musicUrl: 'https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-95.mp3', 
      tips: [
        { title: 'Tarik Napas Dalam', desc: 'Hirup ketenangan selama 4 detik, tahan 4 detik, lalu hembuskan perlahan.' },
        { title: 'Ingat Pencapaianmu', desc: 'Kamu sudah berhasil melewati banyak hari sulit sebelum ini. Kamu hebat!' },
        { title: 'Minum Segelas Air hangat', desc: 'Kadang hal paling sederhana bisa menenangkan tubuh dan pikiranmu yang lelah.' }
      ]
    };

    function App() {
      const [messages, setMessages] = useState(DEFAULT_MESSAGES);
      const [theme, setTheme] = useState('parchment');
      const [currentPage, setCurrentPage] = useState(0);
      const [isEditing, setIsEditing] = useState(false);
      const [copied, setCopied] = useState(false);
      const [isLetterOpen, setIsLetterOpen] = useState(false);
      
      // Audio Player State
      const [isPlaying, setIsPlaying] = useState(false);
      const [audioProgress, setAudioProgress] = useState(0);
      const [audioError, setAudioError] = useState(null);
      const [showResetConfirm, setShowResetConfirm] = useState(false);
      const [particles, setParticles] = useState([]);
      const [editForm, setEditForm] = useState(DEFAULT_MESSAGES);

      const audioRef = useRef(null);

      // Ambil URL musik yang aman (selalu ada fallback)
      const activeMusicUrl = messages.musicUrl || DEFAULT_MESSAGES.musicUrl;

      // Inisialisasi Audio HTML5
      useEffect(() => {
        try {
          if (!audioRef.current) {
            audioRef.current = new Audio(activeMusicUrl);
            audioRef.current.loop = true;
          } else {
            audioRef.current.src = activeMusicUrl;
            if (isPlaying) {
              audioRef.current.play().catch(err => {
                console.log("Audio play diblokir browser sebelum interaksi pertama.");
                setIsPlaying(false);
              });
            }
          }

          const handleTimeUpdate = () => {
            if (audioRef.current && audioRef.current.duration) {
              setAudioProgress((audioRef.current.currentTime / audioRef.current.duration) * 100);
            }
          };

          const handleAudioError = () => {
            setAudioError("Gagal memuat musik. Pastikan link .mp3 valid dan mendukung akses publik.");
            setIsPlaying(false);
          };

          const handleCanPlay = () => {
            setAudioError(null);
          };

          const audioEl = audioRef.current;
          audioEl.addEventListener('timeupdate', handleTimeUpdate);
          audioEl.addEventListener('error', handleAudioError);
          audioEl.addEventListener('canplay', handleCanPlay);

          return () => {
            audioEl.removeEventListener('timeupdate', handleTimeUpdate);
            audioEl.removeEventListener('error', handleAudioError);
            audioEl.removeEventListener('canplay', handleCanPlay);
          };
        } catch (err) {
          console.error("Gagal inisialisasi modul audio:", err);
        }
      }, [activeMusicUrl]);

      // Mengendalikan Status Putar/Jeda Audio
      useEffect(() => {
        if (audioRef.current) {
          if (isPlaying) {
            audioRef.current.play().catch(err => {
              setAudioError("Klik bagian layar mana saja terlebih dahulu agar musik diizinkan diputar.");
              setIsPlaying(false);
            });
          } else {
            audioRef.current.pause();
          }
        }
      }, [isPlaying]);

      // Load data saat website pertama kali dibuka (URL hash atau Local Storage)
      useEffect(() => {
        const handleUrlLoad = () => {
          const hash = window.location.hash;
          if (hash && hash.length > 1) {
            try {
              const base64Str = hash.substring(1);
              const decodedStr = decodeURIComponent(escape(atob(base64Str)));
              const parsedData = JSON.parse(decodedStr);
              if (parsedData && parsedData.recipient) {
                // Melindungi objek agar selalu memiliki properti array tips
                const safeData = {
                  ...DEFAULT_MESSAGES,
                  ...parsedData,
                  tips: parsedData.tips || DEFAULT_MESSAGES.tips
                };
                setMessages(safeData);
                setEditForm(safeData);
              }
            } catch (e) {
              console.error("Gagal mengurai parameter link khusus:", e);
            }
          } else {
            const localData = localStorage.getItem('scrapbook_messages_v2');
            if (localData) {
              try {
                const parsed = JSON.parse(localData);
                const safeData = {
                  ...DEFAULT_MESSAGES,
                  ...parsed,
                  tips: parsed.tips || DEFAULT_MESSAGES.tips
                };
                setMessages(safeData);
                setEditForm(safeData);
              } catch (e) {}
            }
          }
        };

        handleUrlLoad();
        window.addEventListener('hashchange', handleUrlLoad);
        return () => window.removeEventListener('hashchange', handleUrlLoad);
      }, []);

      // Menembakkan Efek Hujan Partikel Emoji
      const triggerEmojiReaction = (emoji, e) => {
        const x = e ? e.clientX : window.innerWidth / 2;
        const y = e ? e.clientY : window.innerHeight / 2;
        
        const newParticles = Array.from({ length: 12 }).map((_, i) => ({
          id: Date.now() + i + Math.random(),
          emoji,
          x,
          y,
          vx: (Math.random() - 0.5) * 8,
          vy: -Math.random() * 6 - 4,
          rotation: Math.random() * 360,
          scale: Math.random() * 0.8 + 0.8,
          opacity: 1
        }));

        setParticles(prev => [...prev, ...newParticles]);
        setTimeout(() => {
          setParticles(prev => prev.filter(p => !newParticles.find(np => np.id === p.id)));
        }, 2000);
      };

      // Loop Animasi Gravitasi Partikel Emoji
      useEffect(() => {
        let animFrame;
        const updateParticles = () => {
          setParticles(prev => 
            prev.map(p => ({
              ...p,
              x: p.x + p.vx,
              y: p.y + p.vy,
              vy: p.vy + 0.15, // Gravitasi jatuh
              rotation: p.rotation + p.vx,
              opacity: Math.max(0, p.opacity - 0.015)
            })).filter(p => p.opacity > 0)
          );
          animFrame = requestAnimationFrame(updateParticles);
        };
        
        if (particles.length > 0) {
          animFrame = requestAnimationFrame(updateParticles);
        }
        return () => cancelAnimationFrame(animFrame);
      }, [particles]);

      const handleSaveEdit = (e) => {
        e.preventDefault();
        setMessages(editForm);
        localStorage.setItem('scrapbook_messages_v2', JSON.stringify(editForm));
        setIsEditing(false);
        triggerEmojiReaction('✨');
      };

      const handleReset = () => {
        setMessages(DEFAULT_MESSAGES);
        setEditForm(DEFAULT_MESSAGES);
        localStorage.removeItem('scrapbook_messages_v2');
        window.location.hash = '';
        setShowResetConfirm(false);
        triggerEmojiReaction('🔄');
      };

      const generateShareLink = () => {
        try {
          const jsonStr = JSON.stringify(messages);
          const base64Str = btoa(unescape(encodeURIComponent(jsonStr)));
          const shareUrl = `${window.location.origin}${window.location.pathname}#${base64Str}`;
          
          const tempInput = document.createElement('input');
          tempInput.value = shareUrl;
          document.body.appendChild(tempInput);
          tempInput.select();
          document.execCommand('copy');
          document.body.removeChild(tempInput);

          setCopied(true);
          triggerEmojiReaction('💝');
          setTimeout(() => setCopied(false), 3000);
        } catch (err) {
          setAudioError("Gagal menyalin otomatis. Silakan salin link di bar alamat browser Anda secara manual.");
        }
      };

      const currentPalette = PALETTES[theme] || PALETTES.parchment;
      const activeTips = messages.tips || DEFAULT_MESSAGES.tips;

      return (
        <div className={`min-h-screen ${currentPalette.bg} text-neutral-800 font-sans transition-colors duration-500 relative overflow-hidden flex flex-col justify-between p-3 md:p-6 select-none`}>
          
          {/* Grid Overlay Kuno */}
          <div className="absolute inset-0 opacity-5 pointer-events-none bg-[radial-gradient(#000_1px,transparent_1px)] [background-size:16px_16px]"></div>
          
          {/* HEADER */}
          <header className="relative z-10 flex justify-between items-center max-w-4xl w-full mx-auto mb-2 border-b border-dashed border-stone-400/40 pb-3">
            <div className="flex items-center gap-2">
              {/* SVG Jurnal */}
              <svg className="w-5 h-5 text-amber-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
              </svg>
              <span className="font-serif italic font-bold text-amber-900 tracking-wide">
                Memori & Dukungan Sahabat
              </span>
            </div>
            
            <div className="flex items-center gap-2">
              {/* Tombol Audio */}
              <button 
                onClick={() => {
                  setIsPlaying(!isPlaying);
                  triggerEmojiReaction('🎵');
                }}
                className={`p-2 rounded-full border border-stone-300 transition-all flex items-center justify-center ${isPlaying ? 'bg-amber-100 text-amber-800 border-amber-400 rotate-180 duration-1000' : 'bg-white/80 hover:bg-stone-50'}`}
                title="Putar Musik Lofi"
              >
                {isPlaying ? (
                  <svg className="w-4 h-4 text-amber-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                  </svg>
                ) : (
                  <svg className="w-4 h-4 text-stone-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
                  </svg>
                )}
              </button>

              {/* Tombol Kustomisasi */}
              <button 
                onClick={() => setIsEditing(!isEditing)}
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-amber-900 text-[#f4efe6] text-xs hover:bg-amber-800 transition-colors shadow-sm font-medium"
              >
                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                  <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span>Kustomisasi</span>
              </button>
            </div>
          </header>

          {/* BOX INFO & ERROR */}
          {audioError && (
            <div className="max-w-md mx-auto w-full bg-red-50 border border-red-200 rounded-lg p-2.5 mb-2 text-center text-xs text-red-900 flex items-center justify-center gap-2 z-20 shadow-sm animate-pulse">
              <svg className="w-4 h-4 text-red-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
              <span>{audioError}</span>
              <button onClick={() => setAudioError(null)} className="ml-auto font-bold text-red-500 hover:text-red-700">✕</button>
            </div>
          )}

          {window.location.hash && !audioError && (
            <div className="max-w-md mx-auto w-full bg-amber-50/90 border border-amber-200 rounded-lg p-2.5 mb-2 text-center text-xs text-amber-950 flex items-center justify-center gap-2 z-10 shadow-sm animate-bounce">
              <svg className="w-4 h-4 text-amber-600 shrink-0 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
              </svg>
              <span>Pesan spesial berhasil dimuat! Ketuk tombol mainkan di sudut kanan untuk memutar lagu ✨</span>
            </div>
          )}

          {/* SCRAPBOOK BINDER CONTAINER */}
          <main className="flex-1 flex items-center justify-center py-4 relative z-10 max-w-4xl w-full mx-auto">
            
            {/* Binder Jurnal Luar */}
            <div className="w-full max-w-2xl min-h-[480px] bg-[#dfd6be] rounded-2xl p-3 md:p-5 shadow-[0_15px_35px_rgba(0,0,0,0.15)] border-4 border-[#bcae94] flex flex-col justify-between relative">
              
              {/* Spiral Logam Binder */}
              <div className="absolute left-4 top-0 bottom-0 w-4 flex flex-col justify-around py-6 pointer-events-none z-20">
                {Array.from({ length: 8 }).map((_, i) => (
                  <div key={i} className="w-7 h-4 bg-gradient-to-r from-stone-400 to-stone-600 rounded-full -ml-4 shadow-md opacity-80" />
                ))}
              </div>

              {/* Halaman Dalam Scrapbook */}
              <div className={`flex-1 rounded-lg ${currentPalette.card} ${currentPalette.border} border p-4 md:p-6 shadow-inner relative flex flex-col justify-between overflow-hidden ml-3`}>
                
                {/* Isolasi Kertas Dekoratif */}
                <div className={`absolute top-2 right-4 w-16 h-5 ${currentPalette.tape} -rotate-12 shadow-sm pointer-events-none`} />
                <div className={`absolute top-4 left-6 w-12 h-4 ${currentPalette.tape} rotate-45 opacity-50 shadow-sm pointer-events-none`} />

                {/* HALAMAN 0: SAMPUL / COVER */}
                {currentPage === 0 && (
                  <div className="flex-1 flex flex-col justify-between py-4 animate-fadeIn">
                    <div className="text-center mt-6">
                      <span className="text-xs uppercase tracking-widest bg-stone-200/60 px-3 py-1 rounded-full text-stone-700 font-bold">
                        Untuk: {messages.recipient}
                      </span>
                      
                      <h1 className="font-serif italic text-3xl md:text-4xl text-stone-800 font-bold mt-6 leading-tight max-w-md mx-auto">
                        {messages.coverTitle}
                      </h1>
                      
                      <p className="text-sm font-serif italic text-stone-600 mt-4 max-w-sm mx-auto">
                        "{messages.coverSubtitle}"
                      </p>
                    </div>

                    <div className="my-6 flex justify-center items-center relative">
                      <div className="w-24 h-24 rounded-full bg-amber-50 border border-amber-200 flex items-center justify-center shadow-inner animate-pulse">
                        <svg className="w-12 h-12 text-red-700/80 fill-red-700/20" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                      </div>
                      <span className="absolute -top-2 left-1/3 text-xl animate-bounce">🌸</span>
                      <span className="absolute bottom-0 right-1/3 text-xl animate-bounce">✨</span>
                    </div>

                    <div className="text-center">
                      <button 
                        onClick={() => {
                          setCurrentPage(1);
                          triggerEmojiReaction('✨');
                        }}
                        className="px-6 py-2 rounded-full border border-stone-400 hover:border-stone-600 font-serif italic text-sm hover:bg-stone-100 transition-all text-stone-800 shadow-sm font-semibold inline-flex items-center gap-2"
                      >
                        Buka Jurnal Memori 
                        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                      </button>
                      <p className="text-[10px] text-stone-400 mt-2 font-mono">{messages.sender}</p>
                    </div>
                  </div>
                )}

                {/* HALAMAN 1: SURAT SEGEL LILIN */}
                {currentPage === 1 && (
                  <div className="flex-1 flex flex-col justify-between py-2 animate-fadeIn">
                    <div>
                      <h2 className="font-serif italic text-lg font-bold text-stone-800 border-b border-stone-300 pb-1 mb-3 flex items-center gap-2">
                        <span>💌</span> Pesan Hangat Dari Sahabat
                      </h2>
                      <p className="text-xs text-stone-500 font-mono mb-4">Hal. 01 — Surat Rahasia Khusus</p>
                    </div>

                    <div className="flex-1 flex items-center justify-center my-2 relative">
                      {!isLetterOpen ? (
                        <div 
                          onClick={() => {
                            setIsLetterOpen(true);
                            triggerEmojiReaction('💖');
                          }}
                          className="w-full max-w-sm p-6 bg-amber-50/60 border-2 border-dashed border-stone-400/80 rounded-xl shadow-md text-center cursor-pointer hover:bg-amber-50 transition-all flex flex-col items-center justify-center group relative min-h-[180px]"
                        >
                          <svg className="w-10 h-10 text-stone-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M3 19v-8.93a2 2 0 01.89-1.664l8-5.333a2 2 0 012.22 0l8 5.333A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76" />
                          </svg>
                          <p className="font-serif italic text-sm text-stone-700 font-semibold mb-1">Pesan ini disegel untukmu</p>
                          <p className="text-xs text-stone-500">Ketuk segel lilin merah di bawah untuk membuka</p>
                          
                          <button className={`absolute -bottom-4 w-10 h-10 rounded-full ${currentPalette.wax} text-amber-100 font-bold flex items-center justify-center shadow-md border-2 border-amber-100/30 active:scale-95`}>
                            ❤
                          </button>
                        </div>
                      ) : (
                        <div className="w-full bg-white/95 border border-stone-300 rounded-xl p-4 shadow-md max-h-[220px] overflow-y-auto relative animate-fadeIn scrollbar-thin">
                          <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-16 h-4 bg-yellow-100/70 shadow-sm border border-yellow-200/40 rotate-1" />
                          
                          <p className="font-serif italic font-semibold text-stone-800 text-sm mb-3">
                            {messages.letterIntro}
                          </p>
                          <p className="text-xs text-stone-700 leading-relaxed font-sans whitespace-pre-wrap">
                            {messages.letterBody}
                          </p>

                          <div className="mt-4 flex justify-between items-center pt-3 border-t border-dotted border-stone-300">
                            <p className="text-[10px] text-stone-400 font-mono">Tutup kembali untuk menyegel amplop.</p>
                            <button 
                              onClick={(e) => {
                                e.stopPropagation();
                                setIsLetterOpen(false);
                                triggerEmojiReaction('🔒');
                              }}
                              className="text-xs text-amber-800 hover:underline font-semibold"
                            >
                              Tutup Surat
                            </button>
                          </div>
                        </div>
                      )}
                    </div>

                    <div className="flex justify-between mt-4">
                      <button 
                        onClick={() => setCurrentPage(0)}
                        className="px-3 py-1.5 rounded-md border border-stone-300 text-xs text-stone-600 hover:bg-stone-50 flex items-center gap-1"
                      >
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                        Kembali
                      </button>
                      <button 
                        onClick={() => {
                          setCurrentPage(2);
                          triggerEmojiReaction('📸');
                        }}
                        className="px-3 py-1.5 rounded-md bg-stone-800 text-stone-100 text-xs hover:bg-stone-700 flex items-center gap-1"
                      >
                        Selanjutnya 
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                      </button>
                    </div>
                  </div>
                )}

                {/* HALAMAN 2: POLAROID MEMOS & RELAKSASI */}
                {currentPage === 2 && (
                  <div className="flex-1 flex flex-col justify-between py-2 animate-fadeIn">
                    <div>
                      <h2 className="font-serif italic text-lg font-bold text-stone-800 border-b border-stone-300 pb-1 mb-2 flex items-center gap-2">
                        <span>🌱</span> Catatan & Ruang Tenang
                      </h2>
                      <p className="text-xs text-stone-500 font-mono mb-3">Hal. 02 — Kutipan & Panduan Relaksasi</p>
                    </div>

                    <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-3 my-2 items-center">
                      <div className="flex flex-col gap-2">
                        <div className="bg-white p-2.5 pb-4 shadow-md border border-stone-200 rotate-[-2deg] flex flex-col gap-1 rounded-sm">
                          <div className="h-1 bg-amber-200/50" />
                          <p className="text-xs font-serif italic text-stone-800 text-center">"{messages.polaroidText1}"</p>
                        </div>
                        <div className="bg-white p-2.5 pb-4 shadow-md border border-stone-200 rotate-[3deg] flex flex-col gap-1 rounded-sm">
                          <div className="h-1 bg-rose-200/50" />
                          <p className="text-xs font-serif italic text-stone-800 text-center">"{messages.polaroidText2}"</p>
                        </div>
                        <div className="bg-white p-2.5 pb-4 shadow-md border border-stone-200 rotate-[-1deg] flex flex-col gap-1 rounded-sm">
                          <div className="h-1 bg-green-200/50" />
                          <p className="text-xs font-serif italic text-stone-800 text-center">"{messages.polaroidText3}"</p>
                        </div>
                      </div>

                      <div className="bg-amber-50/50 p-3 rounded-lg border border-amber-200/60 flex flex-col gap-2.5">
                        <h3 className="text-xs font-bold uppercase tracking-wider text-amber-900 border-b border-amber-200/60 pb-1">Kiat Sederhana Untukmu:</h3>
                        {activeTips.map((tip, idx) => (
                          <div key={idx} className="text-xs">
                            <span className="font-bold text-stone-800">✦ {tip.title}</span>
                            <p className="text-stone-600 pl-3 leading-snug">{tip.desc}</p>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="flex justify-between mt-2">
                      <button 
                        onClick={() => setCurrentPage(1)}
                        className="px-3 py-1.5 rounded-md border border-stone-300 text-xs text-stone-600 hover:bg-stone-50 flex items-center gap-1"
                      >
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                        Kembali
                      </button>
                      <button 
                        onClick={() => {
                          setCurrentPage(3);
                          triggerEmojiReaction('🌸');
                        }}
                        className="px-3 py-1.5 rounded-md bg-stone-800 text-stone-100 text-xs hover:bg-stone-700 flex items-center gap-1"
                      >
                        Kirim Energi 
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                      </button>
                    </div>
                  </div>
                )}

                {/* HALAMAN 3: REAKSI EMOSI INTERAKTIF */}
                {currentPage === 3 && (
                  <div className="flex-1 flex flex-col justify-between py-2 animate-fadeIn">
                    <div className="text-center">
                      <h2 className="font-serif italic text-xl font-bold text-stone-800 mb-1">💖 Kirim Energi Positif</h2>
                      <p className="text-xs text-stone-500 font-mono mb-2">Hal. 03 — Interaksi & Cinta</p>
                      <p className="text-xs text-stone-600 max-w-sm mx-auto mt-2 leading-relaxed">
                        Sedang merasa lelah, sedih, atau butuh semangat ekstra? Ketuk tombol emosi di bawah ini untuk meledakkan energi bahagia di layarmu!
                      </p>
                    </div>

                    <div className="bg-stone-100/60 border border-stone-200/80 p-4 rounded-xl max-w-sm mx-auto w-full my-4 flex flex-col gap-3">
                      <p className="text-[10px] text-center font-bold text-stone-500 uppercase tracking-widest">Pilih perasaanmu saat ini:</p>
                      <div className="grid grid-cols-4 gap-2">
                        {[
                          ['🤗', 'Peluk'], 
                          ['❤️', 'Cinta'], 
                          ['✨', 'Ajaib'], 
                          ['🌸', 'Mekar']
                        ].map(([emoji, label]) => (
                          <button 
                            key={label}
                            onClick={(e) => triggerEmojiReaction(emoji, e)}
                            className="p-3 bg-white hover:bg-amber-50 border border-stone-200 rounded-lg shadow-sm hover:scale-105 active:scale-95 transition-all flex flex-col items-center gap-1"
                          >
                            <span className="text-2xl">{emoji}</span>
                            <span className="text-[9px] font-bold text-stone-500">{label}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="text-center">
                      <p className="text-xs font-serif italic text-stone-700 font-bold mb-1">"You are never alone in this journey."</p>
                      <p className="text-[10px] text-stone-400 font-mono mb-3">{messages.sender}</p>
                      
                      <button 
                        onClick={() => {
                          setCurrentPage(0);
                          triggerEmojiReaction('📖');
                        }}
                        className="px-4 py-1.5 rounded-full border border-stone-300 text-xs text-stone-600 hover:bg-stone-50 transition-all font-semibold inline-flex items-center gap-1.5"
                      >
                        <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18" />
                        </svg>
                        Baca Dari Awal
                      </button>
                    </div>

                    <div className="flex justify-start mt-2">
                      <button 
                        onClick={() => setCurrentPage(2)}
                        className="px-3 py-1.5 rounded-md border border-stone-300 text-xs text-stone-600 hover:bg-stone-50 flex items-center gap-1"
                      >
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                        Kembali
                      </button>
                    </div>
                  </div>
                )}

                {/* Indikator Halaman Bulet */}
                <div className="flex justify-center gap-1.5 mt-4 pt-2 border-t border-stone-300/40">
                  {Array.from({ length: 4 }).map((_, idx) => (
                    <button
                      key={idx}
                      onClick={() => {
                        setCurrentPage(idx);
                        triggerEmojiReaction('📖');
                      }}
                      className={`w-2 h-2 rounded-full transition-all ${currentPage === idx ? 'bg-amber-800 w-4' : 'bg-stone-300 hover:bg-stone-400'}`}
                    />
                  ))}
                </div>

              </div>
            </div>

            {/* VINYL RECORD DEKORASI & MUSIK AKTIF */}
            <div className="hidden lg:flex flex-col items-center gap-3 absolute -right-32 top-1/2 -translate-y-1/2 bg-amber-50 p-4 rounded-2xl border border-stone-300 shadow-lg w-28 text-center rotate-3">
              <div className="relative flex items-center justify-center">
                <div className={`w-16 h-16 rounded-full bg-stone-900 flex items-center justify-center border-4 border-stone-800 shadow-md transition-transform ${isPlaying ? 'animate-spin-slow' : ''}`}>
                  <div className="w-6 h-6 rounded-full bg-amber-200 border-2 border-stone-900 flex items-center justify-center">
                    <div className="w-1.5 h-1.5 rounded-full bg-stone-900" />
                  </div>
                </div>
                <div className={`absolute top-0 right-0 w-8 h-8 origin-top-right transition-transform duration-500 ${isPlaying ? 'rotate-12' : 'rotate-0'}`}>
                  <div className="w-0.5 h-6 bg-stone-400 ml-4 shadow-sm" />
                </div>
              </div>
              <div className="w-full">
                <p className="text-[9px] font-bold text-stone-700 tracking-wider truncate">Vintage Audio</p>
                <div className="w-full bg-stone-200 h-1 rounded-full mt-1.5 overflow-hidden">
                  <div className="bg-amber-800 h-full transition-all duration-100" style={{ width: `${audioProgress}%` }}></div>
                </div>
              </div>
              <button 
                onClick={() => {
                  setIsPlaying(!isPlaying);
                  triggerEmojiReaction('🎵');
                }}
                className="p-1.5 bg-stone-800 hover:bg-stone-700 text-amber-50 rounded-full w-8 h-8 flex items-center justify-center shadow-sm"
              >
                {isPlaying ? (
                  <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                    <path fillRule="evenodd" d="M18 12a1 1 0 01-1 1H7a1 1 0 010-2h10a1 1 0 011 1z" clipRule="evenodd" />
                  </svg>
                ) : (
                  <svg className="w-3.5 h-3.5 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                  </svg>
                )}
              </button>
            </div>

          </main>

          {/* FOOTER */}
          <footer className="relative z-10 text-center max-w-4xl w-full mx-auto mt-2 border-t border-dashed border-stone-400/40 pt-3 flex flex-col md:flex-row items-center justify-between gap-3">
            <p className="text-[10px] text-stone-500 italic">
              Bisa dikustomisasi sepenuhnya. Klik tombol "Kustomisasi" di atas untuk mengganti tulisan dan musik.
            </p>

            <button 
              onClick={generateShareLink}
              className={`px-4 py-2 rounded-full font-semibold text-xs transition-all flex items-center gap-1.5 shadow-sm hover:scale-102 active:scale-98 ${copied ? 'bg-green-700 text-white animate-pulse' : 'bg-amber-800 text-[#f4efe6] hover:bg-amber-700'}`}
            >
              {copied ? (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                </svg>
              ) : (
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M8.684 10.742l-1.954-1.955m0 0A2.25 2.25 0 1110.5 6h2.25m-6.07 4.742L4 12m14.73 1.258l-1.954-1.955m0 0A2.25 2.25 0 1119.5 12h-2.25m6.07 1.258L16 16m-4-4v6m-3-3h6" />
                </svg>
              )}
              <span>{copied ? 'Link Berhasil Disalin!' : 'Salin Link Spesial Temanmu'}</span>
            </button>
          </footer>

          {/* PANEL KUSTOMISASI */}
          {isEditing && (
            <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-xs flex items-center justify-center z-50 p-4 animate-fadeIn">
              <div className="bg-[#fcfaf4] border border-stone-300 rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-5 md:p-6 shadow-2xl relative">
                
                <div className="flex justify-between items-center border-b border-stone-200 pb-3 mb-4">
                  <div className="flex items-center gap-2">
                    <svg className="w-5 h-5 text-amber-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    </svg>
                    <h3 className="font-serif italic text-lg font-bold text-stone-800">Ubah Isi Scrapbook</h3>
                  </div>
                  <button onClick={() => setIsEditing(false)} className="text-stone-400 hover:text-stone-600 font-bold text-lg">✕</button>
                </div>

                {/* Tema Kertas */}
                <div className="mb-4">
                  <label className="block text-xs font-bold text-stone-700 uppercase tracking-wider mb-2">Pilih Tema Kertas Vintage:</label>
                  <div className="grid grid-cols-4 gap-2">
                    {Object.entries(PALETTES).map(([key, value]) => (
                      <button
                        key={key}
                        type="button"
                        onClick={() => {
                          setTheme(key);
                          triggerEmojiReaction('🎨');
                        }}
                        className={`p-2 rounded-lg border text-[10px] font-bold text-center transition-all ${theme === key ? 'border-amber-800 bg-amber-50 shadow-sm' : 'border-stone-200 bg-white hover:bg-stone-50'}`}
                      >
                        <div className={`w-full h-4 rounded-sm ${value.bg} mb-1 border border-stone-300`} />
                        {value.name}
                      </button>
                    ))}
                  </div>
                </div>

                <form onSubmit={handleSaveEdit} className="space-y-4 text-xs">
                  
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block font-bold text-stone-700 mb-1">Nama Penerima:</label>
                      <input 
                        type="text" 
                        value={editForm.recipient}
                        onChange={(e) => setEditForm({...editForm, recipient: e.target.value})}
                        className="w-full p-2 border border-stone-300 rounded-md focus:outline-none"
                        required
                      />
                    </div>
                    <div>
                      <label className="block font-bold text-stone-700 mb-1">Nama Pengirim:</label>
                      <input 
                        type="text" 
                        value={editForm.sender}
                        onChange={(e) => setEditForm({...editForm, sender: e.target.value})}
                        className="w-full p-2 border border-stone-300 rounded-md focus:outline-none"
                        required
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                    <div>
                      <label className="block font-bold text-stone-700 mb-1">Judul Sampul:</label>
                      <input 
                        type="text" 
                        value={editForm.coverTitle}
                        onChange={(e) => setEditForm({...editForm, coverTitle: e.target.value})}
                        className="w-full p-2 border border-stone-300 rounded-md"
                        required
                      />
                    </div>
                    <div>
                      <label className="block font-bold text-stone-700 mb-1">Sub-judul Sampul:</label>
                      <input 
                        type="text" 
                        value={editForm.coverSubtitle}
                        onChange={(e) => setEditForm({...editForm, coverSubtitle: e.target.value})}
                        className="w-full p-2 border border-stone-300 rounded-md"
                        required
                      />
                    </div>
                  </div>

                  {/* LINK FILE MUSIK .MP3 */}
                  <div className="bg-amber-50/50 p-2.5 rounded-lg border border-amber-200">
                    <label className="block font-bold text-amber-950 mb-1 flex items-center gap-1.5">
                      Link File Musik (.mp3):
                    </label>
                    <input 
                      type="url" 
                      value={editForm.musicUrl}
                      onChange={(e) => setEditForm({...editForm, musicUrl: e.target.value})}
                      className="w-full p-2 border border-stone-300 rounded-md focus:ring-amber-800"
                      placeholder="Masukkan link mp3 (harus berakhiran .mp3)"
                      required
                    />
                    <p className="text-[10px] text-stone-500 mt-1">
                      💡 Pastikan link Anda adalah tautan langsung berkas MP3 (contoh: diakhiri dengan .mp3) agar browser dapat memutarnya dengan lancar.
                    </p>
                  </div>

                  <div>
                    <label className="block font-bold text-stone-700 mb-1">Pesan Pembuka Surat:</label>
                    <input 
                      type="text" 
                      value={editForm.letterIntro}
                      onChange={(e) => setEditForm({...editForm, letterIntro: e.target.value})}
                      className="w-full p-2 border border-stone-300 rounded-md font-serif italic"
                      required
                    />
                  </div>

                  <div>
                    <label className="block font-bold text-stone-700 mb-1">Isi Surat Rahasia:</label>
                    <textarea 
                      value={editForm.letterBody}
                      onChange={(e) => setEditForm({...editForm, letterBody: e.target.value})}
                      rows="4"
                      className="w-full p-2 border border-stone-300 rounded-md text-[11px] leading-relaxed"
                      required
                    ></textarea>
                  </div>

                  <div className="space-y-1.5">
                    <label className="block font-bold text-stone-700 mb-1">Tulisan di 3 Memo Polaroid:</label>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                      <input type="text" value={editForm.polaroidText1} onChange={(e) => setEditForm({...editForm, polaroidText1: e.target.value})} className="w-full p-2 border border-stone-300 rounded-md" required />
                      <input type="text" value={editForm.polaroidText2} onChange={(e) => setEditForm({...editForm, polaroidText2: e.target.value})} className="w-full p-2 border border-stone-300 rounded-md" required />
                      <input type="text" value={editForm.polaroidText3} onChange={(e) => setEditForm({...editForm, polaroidText3: e.target.value})} className="w-full p-2 border border-stone-300 rounded-md" required />
                    </div>
                  </div>

                  <div className="flex justify-between items-center pt-3 border-t border-stone-200">
                    <button 
                      type="button" 
                      onClick={() => setShowResetConfirm(true)}
                      className="px-3 py-1.5 rounded-md border border-stone-300 hover:bg-stone-100 font-semibold text-stone-600 flex items-center gap-1"
                    >
                      Setel Ulang
                    </button>
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setIsEditing(false)} className="px-3 py-1.5 border border-stone-200 text-stone-500 font-semibold hover:bg-stone-50">Batal</button>
                      <button type="submit" className="px-4 py-1.5 rounded-md bg-amber-900 text-[#f4efe6] hover:bg-amber-800 font-semibold flex items-center gap-1.5">Simpan</button>
                    </div>
                  </div>

                </form>
              </div>
            </div>
          )}

          {/* DIALOG RESET */}
          {showResetConfirm && (
            <div className="fixed inset-0 bg-stone-900/50 flex items-center justify-center z-50 p-4">
              <div className="bg-white p-5 rounded-xl max-w-sm w-full text-center border border-stone-300 shadow-xl">
                <h4 className="font-bold text-stone-800 text-sm mb-2">Konfirmasi Setel Ulang</h4>
                <p className="text-xs text-stone-600 mb-4">Apakah kamu yakin ingin mengembalikan seluruh pesan dan musik ke bawaan awal?</p>
                <div className="flex justify-center gap-2">
                  <button onClick={() => setShowResetConfirm(false)} className="px-3 py-1.5 border border-stone-200 rounded-md text-xs font-semibold text-stone-500 hover:bg-stone-50">Batal</button>
                  <button onClick={handleReset} className="px-3 py-1.5 bg-red-700 text-white rounded-md text-xs font-semibold hover:bg-red-800">Ya, Setel Ulang</button>
                </div>
              </div>
            </div>
          )}

          {/* EMOJI FLOATING PARTICLES */}
          <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
            {particles.map(p => (
              <div
                key={p.id}
                className="absolute text-3xl select-none"
                style={{
                  left: `${p.x}px`,
                  top: `${p.y}px`,
                  transform: `translate(-50%, -50%) rotate(${p.rotation}deg) scale(${p.scale})`,
                  opacity: p.opacity,
                  transition: 'transform 0.05s linear'
                }}
              >
                {p.emoji}
              </div>
            ))}
          </div>

        </div>
      );
    }

    // Merender aplikasi ke dalam elemen Root
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
